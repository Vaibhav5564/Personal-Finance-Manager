<!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <!-- App Name / Logo -->
        <a class="navbar-brand" href="{{ url_for('main.dashboard') }}">
            💰 Finance Manager
        </a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left side -->
            <ul class="navbar-nav me-auto">

                {% if current_user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.dashboard') }}">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.add_transaction') }}">Add Transaction</a>
                    </li>
                {% endif %}

            </ul>

            <!-- Right side -->
            <ul class="navbar-nav ms-auto">

                {% if current_user.is_authenticated %}
                    <!-- Show username -->
                    <li class="nav-item">
                        <span class="nav-link text-light">
                            👤 {{ current_user.username }}
                        </span>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link btn btn-danger text-white ms-2 px-3" href="{{ url_for('main.logout') }}">
                            Logout
                        </a>
                    </li>

                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.login') }}">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link btn btn-primary text-white ms-2 px-3" href="{{ url_for('main.register') }}">
                            Register
                        </a>
                    </li>
                {% endif %}

            </ul>

        </div>
    </div>
</nav>
